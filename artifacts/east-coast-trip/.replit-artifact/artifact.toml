kind = "web"
previewPath = "/"
title = "East Coast Trip Planner"
version = "1.0.0"
id = "artifacts/east-coast-trip"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18587

[services.development]
run = "pnpm --filter @workspace/east-coast-trip run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/east-coast-trip", "run", "build" ]
publicDir = "artifacts/east-coast-trip/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18587"
BASE_PATH = "/"
